<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DII+</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Poppins:wght@100;200;300;400;500;600;700;800;900&family=Roboto:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="interface">
            <div class="logo">
                <a href="index.html">
                    <img src="img/logo.png" alt="Logo do app">
                </a>
            </div>

            <!-- Botão do menu mobile -->
            <button class="menu-toggle" aria-label="Abrir Menu">
                <i class="bi bi-list"></i>
            </button>

            <!-- Navegação -->
            <nav class="menu">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
                <div class="btn-contato">
                    <a href="login.html"><button>Login</button></a>
                </div>
            </nav>
        </div>
    </header>

    <section class="contato">
        <div class="interface">
            <h2>Formulário de Contato</h2>
            <form id="contatoForm" action="envia-email.php" method="POST">
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" required></textarea>
                </div>
                <button type="submit">Enviar</button>
                <div id="resposta"></div> <!-- Onde a resposta será exibida -->
            </form>
        </div><!-- interface -->
    </section>
    <footer>
        <div class="interface">
            <p>&copy; 2025 IntestiCare. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        // Script para abrir/fechar o menu mobile
        document.querySelector(".menu-toggle").addEventListener("click", function() {
            document.querySelector(".menu").classList.toggle("active");
        });
    </script>
</body>
</html>
